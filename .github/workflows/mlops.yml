name: CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install uv && uv pip install --system .
      - run: pytest tests/ -v --tb=short

  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # GHCR requires lowercase image paths; repository_owner may contain uppercase.
      - name: Lowercase owner
        id: owner
        run: echo "name=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Metadata for weather-api
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.owner.outputs.name }}/weather-api
          tags: |
            type=raw,value=latest
            type=sha,format=long

      - name: Build and push weather-api
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}

      - name: Metadata for weather-ui
        id: meta-ui
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.owner.outputs.name }}/weather-ui
          tags: |
            type=raw,value=latest
            type=sha,format=long

      - name: Build and push weather-ui
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.streamlit
          push: true
          tags: ${{ steps.meta-ui.outputs.tags }}
          labels: ${{ steps.meta-ui.outputs.labels }}

  # ---------------------------------------------------------------------------
  # Deploys the live demo to Hugging Face Spaces by pushing the repo to each
  # Space's git remote. The Spaces are Docker SDK Spaces whose Dockerfiles
  # reference this repo's Dockerfile / Dockerfile.streamlit (see spaces/README.md).
  #
  # ONE-TIME SETUP (the user must do this — Space names are user-specific):
  #   1. Create two Docker SDK Spaces on Hugging Face:
  #        huggingface.co/spaces/<HF_USERNAME>/weather-api
  #        huggingface.co/spaces/<HF_USERNAME>/weather-ui
  #      using the configs in spaces/weather-api/ and spaces/weather-ui/.
  #   2. Add a write-scoped HF access token as the repo secret HF_TOKEN.
  #   3. Add your HF account name as the repo variable HF_USERNAME.
  #   4. Add MLflow/DagsHub creds as Space secrets on the weather-api Space
  #      (see spaces/README.md).
  # ---------------------------------------------------------------------------
  deploy:
    needs: build
    runs-on: ubuntu-latest
    env:
      HF_USERNAME: ${{ vars.HF_USERNAME }}
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.email "ci@github-actions"
          git config user.name "github-actions"

      # HF Docker Spaces build from the root Dockerfile and read front-matter
      # from the root README.md, so prepare those per Space before pushing.
      - name: Push to weather-api Space
        run: |
          cp spaces/weather-api/README.md README.md
          git add -A
          git commit -m "deploy: weather-api Space" --allow-empty
          git push --force \
            "https://${HF_USERNAME}:${HF_TOKEN}@huggingface.co/spaces/${HF_USERNAME}/weather-api" \
            HEAD:main

      - name: Push to weather-ui Space
        run: |
          cp Dockerfile.streamlit Dockerfile
          cp spaces/weather-ui/README.md README.md
          git add -A
          git commit -m "deploy: weather-ui Space" --allow-empty
          git push --force \
            "https://${HF_USERNAME}:${HF_TOKEN}@huggingface.co/spaces/${HF_USERNAME}/weather-ui" \
            HEAD:main
