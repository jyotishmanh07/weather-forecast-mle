name: CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install uv && uv pip install --system .
      - run: pytest tests/ -v --tb=short

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push weather-api
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/weather-api:$IMAGE_TAG -f Dockerfile .
          docker push $ECR_REGISTRY/weather-api:$IMAGE_TAG
          docker tag $ECR_REGISTRY/weather-api:$IMAGE_TAG $ECR_REGISTRY/weather-api:latest
          docker push $ECR_REGISTRY/weather-api:latest

      - name: Build and push weather-ui
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/weather-ui:$IMAGE_TAG -f Dockerfile.streamlit .
          docker push $ECR_REGISTRY/weather-ui:$IMAGE_TAG
          docker tag $ECR_REGISTRY/weather-ui:$IMAGE_TAG $ECR_REGISTRY/weather-ui:latest
          docker push $ECR_REGISTRY/weather-ui:latest

      - name: Deploy to ECS
        run: |
          aws ecs update-service --cluster weather-cluster-ecs --service weather-api-service --force-new-deployment
          aws ecs update-service --cluster weather-cluster-ecs --service weather-ui-service --force-new-deployment
