# Local Airflow stack for the weather closed-loop retraining system.
# Trimmed from the official Airflow docker-compose (LocalExecutor + Postgres).
#
# Run from the repo root:
#   docker compose -f airflow/docker-compose.airflow.yml up -d
# UI: http://localhost:8080  (default login airflow / airflow)
#
# The custom image (Dockerfile.airflow) bakes in the app's runtime deps so the
# DAGs can run `python -m pipelines.*`. The repo is mounted at
# /opt/airflow/project and put on PYTHONPATH; tasks set cwd there.

x-airflow-common: &airflow-common
  build:
    context: ..                          # repo root, so requirements-pipeline.txt is in scope
    dockerfile: airflow/Dockerfile.airflow
  image: weather-airflow:local
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    # Make `python -m pipelines.*` resolvable from the mounted repo.
    PYTHONPATH: /opt/airflow/project
    # MLflow / DagsHub creds (see airflow/.env.example).
    MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI}
    MLFLOW_TRACKING_USERNAME: ${MLFLOW_TRACKING_USERNAME}
    MLFLOW_TRACKING_PASSWORD: ${MLFLOW_TRACKING_PASSWORD}
    DAGSHUB_USER_TOKEN: ${DAGSHUB_USER_TOKEN}
    MLFLOW_MODEL_NAME: ${MLFLOW_MODEL_NAME:-weather-xgb}
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ..:/opt/airflow/project            # the whole repo, so pipelines + data are available
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on: &airflow-common-depends-on
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  # One-shot: run DB migrations and create the default admin user. The official
  # entrypoint does both when the _AIRFLOW_* flags are set (and it handles
  # running as an arbitrary host uid, which a bash entrypoint override doesn't).
  airflow-init:
    <<: *airflow-common
    command: version
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: airflow
      _AIRFLOW_WWW_USER_PASSWORD: airflow

volumes:
  postgres-db-volume:
